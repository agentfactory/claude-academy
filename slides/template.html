<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Claude Academy Slide</title>
  <style>
    /* ── Local Font Faces ─────────────────── */
    @font-face {
      font-family: 'Inter';
      font-weight: 400;
      font-style: normal;
      src: url('fonts/inter-latin-400-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-weight: 600;
      font-style: normal;
      src: url('fonts/inter-latin-600-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-weight: 700;
      font-style: normal;
      src: url('fonts/inter-latin-700-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Playfair Display';
      font-weight: 400;
      font-style: normal;
      src: url('fonts/playfair-display-latin-400-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Playfair Display';
      font-weight: 700;
      font-style: normal;
      src: url('fonts/playfair-display-latin-700-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Playfair Display';
      font-weight: 400;
      font-style: italic;
      src: url('fonts/playfair-display-latin-400-italic.woff2') format('woff2');
    }

    /* ── Reset ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1080px;
      min-height: 1350px;
      font-family: 'Inter', sans-serif;
      background: #EDE7DD;
      color: #1A1714;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Slide Container ───────────────────── */
    .slide {
      width: 1080px;
      min-height: 1350px;
      padding: 48px 64px;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      position: relative;
    }
    .slide > * {
      margin-bottom: 24px;
    }
    .slide > *:last-child {
      margin-bottom: 0;
    }

    /* ── Series Label ──────────────────────── */
    .series-label {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #D4682A;
    }

    /* ── Title ─────────────────────────────── */
    .slide-title {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 400;
      line-height: 1.15;
      color: #1A1714;
      max-width: 800px;
    }

    /* ── Subtitle ──────────────────────────── */
    .slide-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.6;
      color: #6B635A;
      max-width: 700px;
    }

    /* ── Divider ───────────────────────────── */
    .divider {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, #D4682A 0%, #D4682A 30%, transparent 100%);
    }

    /* ── Section Header ────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .section-header-label {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8A8279;
      white-space: nowrap;
    }
    .section-header-line {
      flex: 1;
      height: 1px;
      background: #D5CCBF;
    }

    /* ── Text Box ──────────────────────────── */
    .text-box {
      background: #F7F3ED;
      border: 1px solid #D5CCBF;
      border-radius: 8px;
      padding: 28px 32px;
    }
    .text-box p {
      font-size: 17px;
      line-height: 1.7;
      color: #3D362E;
    }
    .text-box .highlight {
      color: #D4682A;
      font-weight: 500;
    }
    .text-box .highlight-teal {
      color: #3D7A74;
      font-weight: 500;
    }

    /* ── Card Grid (flexbox for wkhtmltoimage compat) ── */
    .card-grid {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-wrap: nowrap;
      flex-wrap: nowrap;
    }
    .card-grid .card {
      -webkit-flex: 1;
      flex: 1;
      min-width: 0;
      margin-right: 20px;
    }
    .card-grid .card:last-child {
      margin-right: 0;
    }
    .card-grid.cols-2 .card {
      -webkit-flex: 0 0 calc(50% - 10px);
      flex: 0 0 calc(50% - 10px);
    }
    .card {
      background: #F7F3ED;
      border: 1px solid #D5CCBF;
      border-radius: 8px;
      padding: 24px 22px;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
    }
    .card > * {
      margin-bottom: 12px;
    }
    .card > *:last-child {
      margin-bottom: 0;
    }
    .card-icon {
      width: 48px;
      height: 48px;
      background: #EDE7DD;
      border: 1px solid #D5CCBF;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-icon svg {
      width: 24px;
      height: 24px;
      color: #3D7A74;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 400;
      color: #1A1714;
    }
    .card-desc {
      font-size: 14px;
      line-height: 1.6;
      color: #6B635A;
    }

    /* ── Comparison Layout (flexbox for compat) ── */
    .comparison {
      display: -webkit-flex;
      display: flex;
    }
    .comparison .comparison-panel:first-child {
      margin-right: 20px;
    }
    .comparison-panel {
      -webkit-flex: 1;
      flex: 1;
      background: #F7F3ED;
      border: 1px solid #D5CCBF;
      border-radius: 8px;
      padding: 28px 26px;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
    }
    .comparison-panel.left {
      border-top: 3px solid #D4682A;
    }
    .comparison-panel.right {
      border-top: 3px solid #3D7A74;
    }
    .comparison-panel > * {
      margin-bottom: 14px;
    }
    .comparison-panel > *:last-child {
      margin-bottom: 0;
    }
    .panel-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 4px;
      width: fit-content;
    }
    .panel-badge.orange {
      background: rgba(212, 104, 42, 0.12);
      color: #D4682A;
    }
    .panel-badge.teal {
      background: rgba(61, 122, 116, 0.12);
      color: #3D7A74;
    }
    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 400;
      color: #1A1714;
    }
    .panel-desc {
      font-size: 14px;
      line-height: 1.6;
      color: #6B635A;
    }
    .panel-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .panel-list li {
      font-size: 14px;
      line-height: 1.5;
      color: #3D362E;
      padding-left: 20px;
      position: relative;
    }
    .panel-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .comparison-panel.left .panel-list li::before {
      background: #D4682A;
    }
    .comparison-panel.right .panel-list li::before {
      background: #3D7A74;
    }

    /* ── Bullet List ───────────────────────── */
    .bullet-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .bullet-list li {
      font-size: 16px;
      line-height: 1.6;
      color: #3D362E;
      padding-left: 24px;
      position: relative;
    }
    .bullet-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #D4682A;
    }

    /* ── Numbered List ─────────────────────── */
    .numbered-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 18px;
      counter-reset: item;
    }
    .numbered-list li {
      font-size: 16px;
      line-height: 1.6;
      color: #3D362E;
      padding-left: 40px;
      position: relative;
      counter-increment: item;
    }
    .numbered-list li::before {
      content: counter(item);
      position: absolute;
      left: 0;
      top: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(212, 104, 42, 0.12);
      color: #D4682A;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Quote Block ───────────────────────── */
    .quote-block {
      background: #F7F3ED;
      border-left: 4px solid #D4682A;
      padding: 24px 28px;
      border-radius: 0 8px 8px 0;
    }
    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-style: italic;
      line-height: 1.5;
      color: #1A1714;
    }
    .quote-attribution {
      margin-top: 16px;
      font-size: 13px;
      font-weight: 600;
      color: #D4682A;
      letter-spacing: 1px;
    }

    /* ── Table ─────────────────────────────── */
    .slide-table {
      width: 100%;
      border-collapse: collapse;
      background: #F7F3ED;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #D5CCBF;
    }
    .slide-table th {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8A8279;
      text-align: left;
      padding: 18px 24px;
      border-bottom: 1px solid #D5CCBF;
      background: #EDE7DD;
    }
    .slide-table td {
      font-size: 15px;
      color: #3D362E;
      padding: 16px 24px;
      border-bottom: 1px solid #E3DDD4;
    }
    .slide-table tr:last-child td {
      border-bottom: none;
    }

    /* ── Spacer ────────────────────────────── */
    .spacer { flex: 1; }

    /* ── Footer ────────────────────────────── */
    .slide-footer {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      padding-top: 24px;
      border-top: 1px solid #D5CCBF;
      margin-top: auto;
    }
    .footer-copyright {
      font-size: 13px;
      color: #8A8279;
    }
    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #D4682A;
    }
  </style>
</head>
<body>
  <!-- This template is rendered by build.js using data from slides.json -->
  <!-- Each section block is conditionally included based on slide data -->
  <div class="slide" id="slide">
    <!-- Content injected by build script -->
  </div>
</body>
</html>
