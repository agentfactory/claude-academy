<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Claude Academy Slide</title>
  <style>
    /* ── Local Font Faces ─────────────────── */
    @font-face {
      font-family: 'Inter';
      font-weight: 400;
      font-style: normal;
      src: url('fonts/inter-latin-400-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-weight: 600;
      font-style: normal;
      src: url('fonts/inter-latin-600-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-weight: 700;
      font-style: normal;
      src: url('fonts/inter-latin-700-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Playfair Display';
      font-weight: 400;
      font-style: normal;
      src: url('fonts/playfair-display-latin-400-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Playfair Display';
      font-weight: 700;
      font-style: normal;
      src: url('fonts/playfair-display-latin-700-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Playfair Display';
      font-weight: 400;
      font-style: italic;
      src: url('fonts/playfair-display-latin-400-italic.woff2') format('woff2');
    }

    /* ── Reset ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1080px;
      min-height: 1350px;
      font-family: 'Inter', sans-serif;
      background: #F5F1EB;
      color: #1A1714;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Slide Container ───────────────────── */
    .slide {
      width: 1080px;
      min-height: 1350px;
      padding: 48px 64px;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .slide > * {
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }
    .slide > *:last-child {
      margin-bottom: 0;
    }

    /* ── Anthropic-style Decorative Graphics ── */
    .deco-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .deco-bg svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* ── Series Label ──────────────────────── */
    .series-label {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #D4682A;
    }

    /* ── Title ─────────────────────────────── */
    .slide-title {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 400;
      line-height: 1.15;
      color: #1A1714;
      max-width: 800px;
    }

    /* ── Subtitle ──────────────────────────── */
    .slide-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.6;
      color: #6B635A;
      max-width: 700px;
    }

    /* ── Divider ───────────────────────────── */
    .divider {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, #D4682A 0%, #D4682A 30%, transparent 100%);
    }

    /* ── Section Header ────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .section-header-label {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8A8279;
      white-space: nowrap;
    }
    .section-header-line {
      flex: 1;
      height: 1px;
      background: #DDD7CD;
    }

    /* ── Text Box ──────────────────────────── */
    .text-box {
      background: #FFFFFF;
      border: 1px solid #E3DDD4;
      border-radius: 8px;
      padding: 28px 32px;
    }
    .text-box p {
      font-size: 17px;
      line-height: 1.7;
      color: #3D362E;
    }
    .text-box .highlight {
      color: #D4682A;
      font-weight: 500;
    }
    .text-box .highlight-teal {
      color: #3D7A74;
      font-weight: 500;
    }

    /* ── Card Grid (flexbox for wkhtmltoimage compat) ── */
    .card-grid {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-wrap: nowrap;
      flex-wrap: nowrap;
    }
    .card-grid .card {
      -webkit-flex: 1;
      flex: 1;
      min-width: 0;
      margin-right: 20px;
    }
    .card-grid .card:last-child {
      margin-right: 0;
    }
    .card-grid.cols-2 .card {
      -webkit-flex: 0 0 calc(50% - 10px);
      flex: 0 0 calc(50% - 10px);
    }
    .card {
      background: #FFFFFF;
      border: 1px solid #E3DDD4;
      border-radius: 8px;
      padding: 24px 22px;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
    }
    .card > * {
      margin-bottom: 12px;
    }
    .card > *:last-child {
      margin-bottom: 0;
    }
    .card-icon {
      width: 48px;
      height: 48px;
      background: #F5F1EB;
      border: 1px solid #E3DDD4;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-icon svg {
      width: 24px;
      height: 24px;
      color: #3D7A74;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 400;
      color: #1A1714;
    }
    .card-desc {
      font-size: 14px;
      line-height: 1.6;
      color: #6B635A;
    }

    /* ── Comparison Layout (flexbox for compat) ── */
    .comparison {
      display: -webkit-flex;
      display: flex;
    }
    .comparison .comparison-panel:first-child {
      margin-right: 20px;
    }
    .comparison-panel {
      -webkit-flex: 1;
      flex: 1;
      background: #FFFFFF;
      border: 1px solid #E3DDD4;
      border-radius: 8px;
      padding: 28px 26px;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
    }
    .comparison-panel.left {
      border-top: 3px solid #D4682A;
    }
    .comparison-panel.right {
      border-top: 3px solid #3D7A74;
    }
    .comparison-panel > * {
      margin-bottom: 14px;
    }
    .comparison-panel > *:last-child {
      margin-bottom: 0;
    }
    .panel-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 4px;
      width: fit-content;
    }
    .panel-badge.orange {
      background: rgba(212, 104, 42, 0.10);
      color: #D4682A;
    }
    .panel-badge.teal {
      background: rgba(61, 122, 116, 0.10);
      color: #3D7A74;
    }
    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 400;
      color: #1A1714;
    }
    .panel-desc {
      font-size: 14px;
      line-height: 1.6;
      color: #6B635A;
    }
    .panel-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .panel-list li {
      font-size: 14px;
      line-height: 1.5;
      color: #3D362E;
      padding-left: 20px;
      position: relative;
    }
    .panel-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .comparison-panel.left .panel-list li::before {
      background: #D4682A;
    }
    .comparison-panel.right .panel-list li::before {
      background: #3D7A74;
    }

    /* ── Bullet List ───────────────────────── */
    .bullet-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .bullet-list li {
      font-size: 16px;
      line-height: 1.6;
      color: #3D362E;
      padding-left: 24px;
      position: relative;
    }
    .bullet-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #D4682A;
    }

    /* ── Numbered List ─────────────────────── */
    .numbered-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 18px;
      counter-reset: item;
    }
    .numbered-list li {
      font-size: 16px;
      line-height: 1.6;
      color: #3D362E;
      padding-left: 40px;
      position: relative;
      counter-increment: item;
    }
    .numbered-list li::before {
      content: counter(item);
      position: absolute;
      left: 0;
      top: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(212, 104, 42, 0.10);
      color: #D4682A;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Quote Block ───────────────────────── */
    .quote-block {
      background: #FFFFFF;
      border-left: 4px solid #D4682A;
      padding: 24px 28px;
      border-radius: 0 8px 8px 0;
    }
    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-style: italic;
      line-height: 1.5;
      color: #1A1714;
    }
    .quote-attribution {
      margin-top: 16px;
      font-size: 13px;
      font-weight: 600;
      color: #D4682A;
      letter-spacing: 1px;
    }

    /* ── Table ─────────────────────────────── */
    .slide-table {
      width: 100%;
      border-collapse: collapse;
      background: #FFFFFF;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #E3DDD4;
    }
    .slide-table th {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8A8279;
      text-align: left;
      padding: 18px 24px;
      border-bottom: 1px solid #E3DDD4;
      background: #F5F1EB;
    }
    .slide-table td {
      font-size: 15px;
      color: #3D362E;
      padding: 16px 24px;
      border-bottom: 1px solid #EDE9E2;
    }
    .slide-table tr:last-child td {
      border-bottom: none;
    }

    /* ── Spacer ────────────────────────────── */
    .spacer { flex: 1; }

    /* ── Footer ────────────────────────────── */
    .slide-footer {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      padding-top: 24px;
      border-top: 1px solid #DDD7CD;
      margin-top: auto;
    }
    .footer-copyright {
      font-size: 13px;
      color: #8A8279;
    }
    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #D4682A;
    }
  </style>
</head>
<body>

  <!-- Each section block is conditionally included based on slide data -->
  <div class="slide" id="slide">
    <!-- Anthropic-style decorative background graphics -->
    <div class="deco-bg">
      <svg viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
        <!-- Top-right flowing curves (Anthropic neural-path style) -->
        <path d="M 750 0 Q 850 80, 920 200 Q 990 320, 1020 450 Q 1050 580, 1080 650"
              stroke="url(#grad-orange)" stroke-width="1.5" fill="none" opacity="0.25"/>
        <path d="M 800 0 Q 900 100, 950 240 Q 1000 380, 1040 500 Q 1080 620, 1080 700"
              stroke="url(#grad-orange)" stroke-width="1" fill="none" opacity="0.15"/>

              stroke="url(#grad-teal)" stroke-width="1" fill="none" opacity="0.18"/>

        <!-- Bottom-left flowing curves -->
        <path d="M 0 900 Q 60 950, 120 1020 Q 180 1090, 200 1200 Q 220 1310, 250 1350"

        <circle cx="920" cy="60" r="2.5" fill="#D4682A" opacity="0.18"/>

        <circle cx="900" cy="180" r="1.5" fill="#D4682A" opacity="0.10"/>

        <!-- Dot constellation - bottom left area -->
        <circle cx="60" cy="1180" r="2.5" fill="#3D7A74" opacity="0.18"/>
        <circle cx="100" cy="1210" r="1.5" fill="#3D7A74" opacity="0.12"/>
        <circle cx="40" cy="1240" r="2" fill="#D4682A" opacity="0.15"/>
        <circle cx="120" cy="1250" r="1.5" fill="#3D7A74" opacity="0.10"/>
        <circle cx="80" cy="1280" r="2" fill="#D4682A" opacity="0.12"/>
        <circle cx="140" cy="1290" r="1.5" fill="#3D7A74" opacity="0.14"/>
        <circle cx="50" cy="1310" r="2.5" fill="#D4682A" opacity="0.10"/>

        <!-- Subtle radial glow - top right -->
        <radialGradient id="glow-tr" cx="95%" cy="5%" r="30%">
          <stop offset="0%" stop-color="#D4682A" stop-opacity="0.06"/>
          <stop offset="100%" stop-color="#D4682A" stop-opacity="0"/>
        </radialGradient>
        <rect x="0" y="0" width="1080" height="1350" fill="url(#glow-tr)"/>

        <!-- Subtle radial glow - bottom left -->
        <radialGradient id="glow-bl" cx="5%" cy="90%" r="25%">
          <stop offset="0%" stop-color="#3D7A74" stop-opacity="0.05"/>
          <stop offset="100%" stop-color="#3D7A74" stop-opacity="0"/>
        </radialGradient>
        <rect x="0" y="0" width="1080" height="1350" fill="url(#glow-bl)"/>

        <!-- Gradient definitions for strokes -->
        <defs>
          <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#D4682A" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#D4682A" stop-opacity="0.1"/>
          </linearGradient>
          <linearGradient id="grad-teal" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3D7A74" stop-opacity="0.5"/>

  </div>
</body>
</html>
